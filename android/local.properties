# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE will override any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Parallel builds
org.gradle.parallel=false
org.gradle.workers.max=4

# AndroidX and Jetifier (REQUIRED for Flutter/Firebase/ZegoCloud)
android.useAndroidX=true
android.enableJetifier=true

# Kotlin code style
kotlin.code.style=official

# Build options
android.useDeprecatedNdk=false
android.ndkVersion=25.1.8937393

# Enable faster builds
org.gradle.caching=true
org.gradle.configureondemand=true

# Suppress warnings
android.suppressUnsupportedCompileSdkWarning=true
android.suppressUnsupportedTargetSdkWarning=true
