pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        rootProject.file("local.properties").withInputStream { properties.load(it) }
        properties.getProperty("flutter.sdk")
    }()
    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

include ":app"
