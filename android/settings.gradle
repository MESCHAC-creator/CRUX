include ':app'

def localPropertiesFile = new File(rootDir, 'local.properties')
def localProperties = new Properties()

if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')

// Si flutter.sdk n'est pas défini, chercher automatiquement
if (flutterRoot == null || flutterRoot.isEmpty()) {
    // Chercher dans les emplacements courants
    def possiblePaths = [
        '/opt/flutter',
        System.env.FLUTTER_HOME,
        System.env.FLUTTER_SDK,
        System.getProperty('user.home') + '/.pub-cache/flutter'
    ].findAll { it != null && !it.isEmpty() }
    
    flutterRoot = possiblePaths.find { new File(it).exists() }
    
    if (flutterRoot == null) {
        throw new GradleException('Flutter SDK not found. Please ensure Flutter is installed and FLUTTER_SDK or FLUTTER_HOME environment variable is set.')
    }
}

def flutterGradlePath = flutterRoot + '/packages/flutter_tools/gradle'
apply from: flutterGradlePath + '/flutter.gradle'
